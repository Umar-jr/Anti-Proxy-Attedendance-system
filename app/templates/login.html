{% extends 'base.html' %}
{% block content %}

<div style="display:flex;justify-content:center;padding:3rem 0;">
  <div style="width:100%;max-width:420px;">

    <div style="text-align:center;margin-bottom:2rem;" class="fu">
      <div style="width:64px;height:64px;border-radius:18px;background:var(--indigo-light);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 1rem;box-shadow:0 4px 20px var(--indigo-glow);">🎓</div>
      <h1 style="font-family:'Outfit',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.3rem;">Welcome back</h1>
      <p class="text-muted" style="font-size:.9rem;">Sign in to your AttendQR account</p>
    </div>

    <div class="card fu fu-1">
      <div class="card-body" style="padding:2rem;">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div style="display:flex;flex-direction:column;gap:1rem;">
            <div class="field">
              <label>Email address</label>
              <input type="email" name="email" required placeholder="your@university.edu" autofocus>
            </div>
            <div class="field">
              <label>Password</label>
              <input type="password" name="password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.25rem;">Sign in →</button>
          </div>
        </form>

        <hr class="divider">

        <div style="background:var(--slate-100);border-radius:var(--radius-sm);padding:.9rem 1rem;">
          <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--slate-500);margin-bottom:.4rem;">Demo credentials</div>
          <div style="font-size:.82rem;color:var(--slate-700);font-family:'Source Sans 3',monospace;">
            <div>📧 admin@uni.edu</div>
            <div>🔑 Admin123!</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

{% endblock %}
