{% extends 'base.html' %}
{% block content %}

<div style="display:flex;justify-content:center;padding:3rem 0;">
  <div style="width:100%;max-width:420px;">

    <div style="text-align:center;margin-bottom:2rem;" class="fu">
      <div style="width:64px;height:64px;border-radius:18px;background:var(--indigo-light);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 1rem;box-shadow:0 4px 20px var(--indigo-glow);">🔑</div>
      <h1 style="font-family:'Outfit',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.3rem;">Change password</h1>
      <p class="text-muted" style="font-size:.9rem;">Signed in as {{ current_user.email }}</p>
    </div>

    <div class="card fu fu-1">
      <div class="card-body" style="padding:2rem;">
        <form method="post" action="{{ url_for('main.change_password') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div style="display:flex;flex-direction:column;gap:1rem;">
            <div class="field">
              <label>Current password</label>
              <input type="password" name="current_password" required placeholder="Your current password" autofocus>
            </div>
            <div class="field">
              <label>New password</label>
              <input type="password" name="new_password" required minlength="8" placeholder="At least 8 characters">
            </div>
            <div class="field">
              <label>Confirm new password</label>
              <input type="password" name="confirm_password" required minlength="8" placeholder="Re-enter new password">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.25rem;">Update password</button>
          </div>
        </form>

        <hr class="divider">
        <a class="btn btn-ghost btn-sm btn-full" href="{{ url_for('main.dashboard') }}">← Back to dashboard</a>
      </div>
    </div>

  </div>
</div>

{% endblock %}
