# Fly.io config. Run `fly launch --no-deploy` once to claim an app name,
# then `fly deploy`. jnb (Johannesburg) is the closest region to Nigeria.
app = "qr-attendance"
primary_region = "jnb"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
